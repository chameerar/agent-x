<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent X</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.5 system-ui, sans-serif;
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: #f6f7f9; color: #1b1d22;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid #d9dde3;
    display: flex; align-items: center; gap: 12px; background: #fff;
  }
  header h1 { font-size: 16px; margin: 0; flex: 1; }
  button {
    font: inherit; padding: 6px 12px; border: 1px solid #c2c8d0;
    border-radius: 8px; background: #fff; cursor: pointer;
  }
  button:hover { background: #eef1f5; }
  #log {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 70ch; padding: 9px 13px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .user { align-self: flex-end; background: #2563eb; color: #fff; }
  .ai   { align-self: flex-start; background: #fff; border: 1px solid #d9dde3; }
  .tool { align-self: flex-start; font-family: ui-monospace, monospace; font-size: 13px;
          background: #eef1f5; color: #475063; border-radius: 8px; padding: 5px 10px; }
  .err  { align-self: flex-start; background: #fde8e8; color: #9b1c1c; border-radius: 8px; }
  form { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #d9dde3; background: #fff; }
  #input { flex: 1; padding: 9px 12px; border: 1px solid #c2c8d0; border-radius: 8px; font: inherit; }
</style>
</head>
<body>
  <header>
    <h1>Agent X</h1>
    <button id="reset">New chat</button>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="Ask something…" autofocus>
    <button type="submit">Send</button>
  </form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = form.querySelector('button[type=submit]');
let bubble = null; // the assistant bubble currently being streamed into

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  if (text) el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

function handle(ev) {
  switch (ev.kind) {
    case 'token':
      // A tool call may precede the real answer, so tokens belong to the
      // CURRENT utterance. Open a fresh bubble only when none is active.
      if (!bubble) bubble = add('ai', '');
      bubble.textContent += ev.text;
      break;
    case 'tool_call':
      bubble = null; // close any preamble bubble; the answer comes after the tool
      add('tool', '🔧 ' + ev.tool + '(' + ev.args + ')');
      break;
    case 'tool_result':
      add('tool', '↳ ' + ev.result);
      break;
    case 'done':
      bubble = null; // next turn starts its own bubble
      break;
    case 'error':
      bubble = null;
      add('err', 'error: ' + ev.text);
      break;
  }
  log.scrollTop = log.scrollHeight;
}

async function send(text) {
  add('user', text);
  bubble = null;
  sendBtn.disabled = true;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!resp.ok) { add('err', 'request failed: ' + resp.status); return; }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (line) handle(JSON.parse(line));
      }
    }
  } catch (e) {
    add('err', String(e));
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  send(text);
});

document.getElementById('reset').addEventListener('click', async () => {
  await fetch('/api/reset', { method: 'POST' });
  log.innerHTML = '';
  bubble = null;
  input.focus();
});
</script>
</body>
</html>
